<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastermind - 2 Jugadores</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="container">
        <!-- Start Screen -->
        <section id="start-screen" class="screen">
            <h1>Mastermind</h1>
            <form id="setup-form">
                <div class="field">
                    <label for="p1-name">Jugador 1:</label>
                    <input type="text" id="p1-name" required placeholder="Nombre J1">
                </div>
                <div class="field">
                    <label for="p2-name">Jugador 2:</label>
                    <input type="text" id="p2-name" required placeholder="Nombre J2">
                </div>
                <div class="field">
                    <label for="mode">Modo de código:</label>
                    <select id="mode">
                        <option value="auto">Automático (App)</option>
                        <option value="manual">Manual (Jugador 1 define)</option>
                    </select>
                </div>
                <div class="field">
                    <label>
                        <input type="checkbox" id="allow-repeats"> Permitir repetidos
                    </label>
                </div>
                <button type="submit" class="btn-primary">Empezar Partida</button>
            </form>
        </section>

        <!-- Secret Definition Screen (Manual mode) -->
        <section id="secret-screen" class="screen hidden">
            <h2 id="secret-prompt">Jugador 1, introduce el código secreto (6 dígitos)</h2>
            <form id="secret-form">
                <input type="password" id="manual-secret" maxlength="6" pattern="\d{6}" required placeholder="******" autocomplete="off">
                <p class="error-msg" id="secret-error"></p>
                <button type="submit" class="btn-primary">Confirmar Secreto</button>
            </form>
        </section>

        <!-- Game View -->
        <section id="game-screen" class="screen hidden">
            <header class="game-header">
                <div id="turn-indicator" aria-live="polite">Turno de: <span id="current-player"></span></div>
                <div id="attempts-left">Intentos restantes: <span id="remaining">10</span></div>
            </header>

            <form id="guess-form">
                <div class="input-group">
                    <label for="guess-input" class="sr-only">Introduce tu intento</label>
                    <input type="text" id="guess-input" maxlength="6" pattern="\d{6}" required placeholder="Ej: 123456" autocomplete="off">
                    <button type="submit" class="btn-primary">Intentar</button>
                </div>
                <p class="error-msg" id="guess-error"></p>
            </form>

            <div id="history-container">
                <h3>Historial de Intentos</h3>
                <div id="history-list" role="log" aria-relevant="additions">
                    <!-- Intentos se añadirán aquí -->
                </div>
            </div>
        </section>

        <!-- End Screen -->
        <section id="end-screen" class="screen hidden">
            <h2 id="result-title">¡Fin de la partida!</h2>
            <p id="result-message"></p>
            <div id="final-stats"></div>
            <button id="restart-btn" class="btn-primary">Jugar de nuevo</button>
        </section>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
